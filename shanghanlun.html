<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상한론 처방 종합 학습</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',Apple SD Gothic Neo,Malgun Gothic,sans-serif;background:#f5f5f5;padding:1rem;}
.w{max-width:900px;margin:0 auto;background:#fff;border-radius:12px;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);}
h1{font-size:20px;font-weight:700;color:#111;margin-bottom:4px;}
.sub{font-size:12px;color:#888;margin-bottom:1.2rem;}
.tab-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem;}
.tab{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#555;cursor:pointer;transition:all .15s;font-family:inherit;}
.tab.on{color:#fff;border-color:transparent;}
.sec{display:none;}.sec.vis{display:block;}
.stitle{font-size:12px;font-weight:500;color:#666;margin-bottom:.6rem;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-bottom:1.2rem;}
.card{border-radius:10px;border:1px solid #e5e5e5;background:#fff;overflow:hidden;cursor:pointer;transition:transform .15s;font-family:inherit;}
.card:hover{transform:translateY(-2px);}
.card.flip .cf{display:none;}.card.flip .cb{display:flex;}
.cf{display:flex;flex-direction:column;}
.cb{display:none;flex-direction:column;padding:.9rem;background:#f9f9f9;min-height:170px;}
.ckrow{display:flex;align-items:center;gap:6px;padding:6px 11px 0;}
.ck{width:16px;height:16px;border-radius:4px;border:1.5px solid #ccc;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:all .12s;}
.cklabel{font-size:10px;color:#888;cursor:pointer;}
.chead{padding:9px 11px 7px;display:flex;align-items:flex-start;gap:7px;}
.cdot{width:7px;height:7px;border-radius:50%;margin-top:6px;flex-shrink:0;}
.cname{font-size:13px;font-weight:700;color:#111;line-height:1.3;}
.csub{font-size:10px;color:#888;margin-top:2px;}
.cdiv{height:1px;background:#eee;margin:0 11px;}
.cbody{padding:7px 11px 8px;}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px;}
.tag{font-size:10px;padding:2px 6px;border-radius:9px;font-family:inherit;}
.csymp{font-size:10px;color:#666;line-height:1.5;}
.fhint{font-size:9px;color:#bbb;text-align:right;padding:0 9px 6px;margin-top:auto;}
.btitle{font-size:12px;font-weight:700;margin-bottom:7px;}
.hlist{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.herb{font-size:10px;padding:2px 7px;border-radius:7px;background:#fff;border:1px solid #ddd;color:#555;font-family:inherit;}
.herb.k{font-weight:700;}
.brow{font-size:10px;color:#666;margin-bottom:3px;line-height:1.4;}
.brow strong{color:#111;font-weight:700;}
.bhint{font-size:9px;color:#bbb;margin-top:auto;text-align:right;}
.cmpbar{position:sticky;bottom:0;background:#fff;border-top:1px solid #eee;padding:.75rem 0;display:flex;align-items:center;gap:10px;z-index:10;margin-top:1rem;}
.cmpbtn{font-size:12px;font-weight:700;padding:6px 16px;border-radius:20px;border:none;cursor:pointer;color:#fff;background:#7b3fa0;transition:opacity .15s;font-family:inherit;}
.cmpbtn:disabled{opacity:.4;cursor:not-allowed;}
.clrbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#666;font-family:inherit;}
.cmpcount{font-size:11px;color:#888;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;padding:1rem;overflow:auto;align-items:flex-start;justify-content:center;}
.overlay.open{display:flex;}
.mbox{background:#fff;border-radius:12px;border:1px solid #ddd;width:100%;max-width:720px;margin-top:2rem;font-family:inherit;}
.mhead{padding:1rem 1.25rem .75rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;}
.mhead h2{font-size:14px;font-weight:700;color:#111;}
.mcls{font-size:22px;cursor:pointer;color:#888;background:none;border:none;line-height:1;font-family:inherit;}
.mbody{padding:1rem 1.25rem;}
.cmp-grid{display:grid;gap:10px;}
.cmp-col{border:1px solid #eee;border-radius:8px;padding:.75rem;background:#f9f9f9;}
.cmp-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.cmp-sec{font-size:9px;font-weight:700;color:#aaa;margin-bottom:3px;margin-top:8px;text-transform:uppercase;letter-spacing:.03em;}
.cmp-hlist{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.shared-row{background:#f0faf4;border-radius:8px;padding:.6rem .8rem;margin-top:.75rem;border:1px solid #b2dfdb;}
.shared-row h3{font-size:11px;font-weight:700;color:#2e7d32;margin-bottom:5px;}
.shared-tags{display:flex;flex-wrap:wrap;gap:3px;}
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;}
.pb-card{border-radius:8px;border:1px solid #eee;background:#fff;padding:9px 11px;}
.pb-han{font-size:20px;font-weight:700;}
.pb-name{font-size:11px;font-weight:500;margin-bottom:3px;}
.pb-desc{font-size:10px;color:#666;line-height:1.5;}
.pb-ex{font-size:9px;margin-top:5px;padding:2px 7px;border-radius:7px;display:inline-block;}
.cmpbox{border-radius:10px;border:1px solid #eee;background:#fff;padding:.9rem 1.1rem;margin-bottom:.7rem;}
.cmpbox h3{font-size:12px;font-weight:700;margin-bottom:7px;color:#111;}
.cmpg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.cmpc{font-size:11px;line-height:1.6;color:#666;}
.cmpc strong{color:#111;font-weight:700;font-size:12px;display:block;margin-bottom:3px;}
.diff{color:#c0392b;font-weight:700;}
.sgbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.sgitem{text-align:center;padding:9px 13px;border-radius:8px;}
.sgarr{font-size:16px;color:#ccc;}
.mprint{font-size:11px;font-weight:600;padding:5px 11px;border-radius:16px;border:1px solid #7b3fa0;background:#fff;color:#7b3fa0;cursor:pointer;font-family:inherit;transition:all .15s;}
.mprint:hover{background:#7b3fa0;color:#fff;}

/* ===== 인쇄: 비교 화면만 출력 ===== */
@media print {
  @page { size: A4; margin: 12mm; }
  body { background:#fff !important; padding:0 !important; }
  body.printing-cmp > .w { display:none !important; }
  body.printing-cmp .overlay {
    position:static !important; display:block !important;
    background:#fff !important; padding:0 !important;
    inset:auto !important;
  }
  body.printing-cmp .mbox {
    max-width:100% !important; margin:0 !important;
    border:none !important; box-shadow:none !important;
  }
  body.printing-cmp .mhead { border-bottom:2px solid #000 !important; padding:0 0 8px !important; margin-bottom:12px !important; }
  body.printing-cmp .mhead h2 { font-size:14pt !important; color:#000 !important; }
  body.printing-cmp .mprint,
  body.printing-cmp .mcls { display:none !important; }
  body.printing-cmp .mbody { padding:0 !important; }
  body.printing-cmp .cmp-col { break-inside:avoid; page-break-inside:avoid; }
  body.printing-cmp .cmpbar { display:none !important; }
  body.printing-cmp .herb,
  body.printing-cmp .shared-row,
  body.printing-cmp .cmp-col {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
}
</style>
</head>
<body>
<div class="w">
<h1>상한론 처방 종합 학습</h1>
<p class="sub">탭 선택 → 카드 클릭하면 약재 확인 | 체크박스 선택 후 [비교하기]로 약재 비교</p>
<div class="tab-row" id="tabs"></div>
<div id="secs"></div>
<div class="cmpbar">
  <button class="cmpbtn" id="cmpbtn" disabled>0개 선택 — 비교하기</button>
  <button class="clrbtn" id="clrbtn">선택 초기화</button>
  <span class="cmpcount" id="cmpcount"></span>
</div>
</div>

<div class="overlay" id="overlay">
  <div class="mbox">
    <div class="mhead">
      <h2>처방 약재 비교</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="mprint" id="mprint" title="인쇄">🖨️ 인쇄</button>
        <button class="mcls" id="mcls">×</button>
      </div>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script>
const PAL={red:'#c0392b',blue:'#1a6b8a',teal:'#17606e',purple:'#7b3fa0',orange:'#e67e22',green:'#2e7d32',brown:'#8e3a00'};
const LT={red:'#fdf2f2',blue:'#eaf6fb',teal:'#e8f6f8',purple:'#f5eef8',orange:'#fef9f0',green:'#f1f8e9',brown:'#fef3e7'};
const MD={red:'#e8a09a',blue:'#8dc8df',teal:'#76d7c4',purple:'#ce93d8',orange:'#f5cba7',green:'#a5d6a7',brown:'#f0b27a'};
const TC=['#c0392b','#1a6b8a','#17606e','#7b3fa0','#e67e22','#2e7d32','#8e3a00','#555'];

const SECS=[
  {name:'계지탕류',color:'red',note:'태양중풍(표허증) 치료',cards:[
    {name:'계지탕',sub:'기본방',herbs:['계지','생강','작약','대조','자감초'],key:['계지','작약'],symp:'발열·한출·오풍·맥부완',point:'영위 조화 / 복용 후 열희죽+이불 덮기'},
    {name:'계지가계탕',sub:'계지 5냥',herbs:['계지(5냥)','생강','작약','대조','자감초'],key:['계지(5냥)'],symp:'분돈奔豚 — 벌겋게 솟아오름',point:'심양기허 → 신의 음사 상충'},
    {name:'계지가작약탕',sub:'작약 6냥',herbs:['계지','생강','작약(6냥)','대조','자감초'],key:['작약(6냥)'],symp:'복통·배 창만(빵빵)',point:'오치로 한사가 속으로 침입'},
    {name:'계지가대황탕',sub:'가작약탕 + 대황',herbs:['계지','생강','작약(6냥)','대조','자감초','대황'],key:['대황'],symp:'창만·동통·농혈설사·후중감',point:'현맥 / 계지가작약탕에 대황 추가'},
    {name:'계지가갈근탕',sub:'+ 마황·갈근',herbs:['계지','작약','생강','대조','감초','마황','갈근'],key:['갈근','마황'],symp:'한출·오풍·후뇌부 통증',point:'고혈압·동맥경화 / 소음인 주의'},
    {name:'계지가인삼탕',sub:'신가탕',herbs:['계지','작약(증량)','생강(증량)','대조','자감초','인삼'],key:['인삼'],symp:'맥침지·동통',point:'산후·월경 후 영기허'},
    {name:'계지가부자탕',sub:'+ 부자',herbs:['계지','생강','작약','대조','자감초','부자'],key:['부자'],symp:'땀 줄줄·굴신불리·소변불리·속 차다',point:'유한 / 안 되면 사역탕'},
    {name:'계지가황기탕',sub:'+ 황기',herbs:['계지','생강','작약','대조','자감초','황기'],key:['황기'],symp:'맥부·오래된 병·위기허',point:'육계>계피'},
    {name:'계지가후박행자탕',sub:'+ 후박·행인',herbs:['계지','생강','작약','대조','자감초','후박','행인'],key:['후박','행인'],symp:'맥부완·유한·기침 (한증+허증)',point:'vs 마행감석탕(열증) vs 마황탕(실증)'},
  ]},

    {name:'마황탕',sub:'기본방',herbs:['마황','계지','행인','자감초'],key:['마황'],symp:'무한·오한·신동·요통·천식 / 맥부긴',point:'발한해표 선폐평천 / 마황:감초=3:1 / 거품 걷기'},
    {name:'소청룡탕',sub:'- 행인 + 반하·작약·오미자·건강·세신',herbs:['마황','계지','자감초','반하','작약','오미자','건강','세신'],key:['반하','오미자','세신'],symp:'감기+맑은콧물+코맹맹 / 표한내음증',point:'한음으로 인한 기침·천식 / 장기복용 금지'},

    {name:'마행감석탕',sub:'- 계지 + 석고',herbs:['마황','행인','감초','석고'],key:['석고'],symp:'한출·발열·천식 (열증)',point:'폐열로 인한 천식'},
  ]},
  {name:'영계제',color:'teal',note:'수기상충증(水氣上衝證) 치료 / 기본방: 복령·계지·백출·자감초',cards:[
    {name:'영계출감탕',sub:'기본방',herbs:['복령','계지','백출','자감초'],key:['복령','계지'],symp:'심하에서 수기 상충 / 소화기 문제',point:'기본방 — 상충하는 기 내려 음 삭임'},
    {name:'영계감초탕',sub:'- 백출 + 대조',herbs:['복령(30g)','계지','자감초','대조(12개)'],key:['대조(12개)'],symp:'제하계·욕작분돈',point:'원인: 심장 / 감란수로 달여 복용'},

  {name:'시호탕류',color:'purple',note:'소양병 화해법 / 단견일증변시(但見一證便是)',cards:[

let selected=new Map();

function makeCard(d,si){
  const col=d.color||SECS[si].color;
  const c=PAL[col],cl=LT[col],cm=MD[col];
  const uid=si+'_'+d.name;
  const el=document.createElement('div');
  el.className='card';
  const herbs=d.herbs.map(h=>{
    const isKey=d.key.includes(h);
    return `<span class="herb${isKey?' k':''}" style="${isKey?`background:${cl};color:${c};border-color:${cm};`:''}">${h}</span>`;
  }).join('');
  const tags=d.symp.split('·').slice(0,2).map(t=>`<span class="tag" style="background:${cl};color:${c};">${t.split(' /')[0]}</span>`).join('');
  el.innerHTML=`
  <div class="ckrow">
    <div class="ck" id="ck_${uid}" data-uid="${uid}"></div>
    <span class="cklabel">비교 선택</span>
  </div>
  <div class="cf">
    <div class="chead"><div class="cdot" style="background:${c};"></div>
      <div><div class="cname">${d.name}</div><div class="csub">${d.sub}</div></div>
    </div>
    <div class="cdiv"></div>
    <div class="cbody"><div class="tags">${tags}</div><div class="csymp">${d.symp}</div></div>
    <div class="fhint">클릭하면 약재 확인</div>
  </div>
  <div class="cb" style="border-left:3px solid ${c};">
    <div class="btitle" style="color:${c};">${d.name}</div>
    <div class="hlist">${herbs}</div>
    <div class="brow"><strong>특징</strong> ${d.point}</div>
    <div class="bhint">다시 클릭하면 닫힘</div>
  </div>`;
  el.addEventListener('click',e=>{
    if(e.target.closest('.ck')||e.target.closest('.cklabel'))return;
    el.classList.toggle('flip');
  });
  const ck=el.querySelector('.ck');
  const cklabel=el.querySelector('.cklabel');
  function toggleCk(){
    if(selected.has(uid)){
      selected.delete(uid);
      ck.style.background='';ck.style.borderColor='#ccc';ck.textContent='';
    } else if(selected.size<10){
      selected.set(uid,{...d,_si:si});
      ck.style.background=c;ck.style.borderColor=c;ck.textContent='✓';ck.style.color='#fff';
    }
    updateBar();
  }
  ck.addEventListener('click',e=>{e.stopPropagation();toggleCk();});
  cklabel.addEventListener('click',e=>{e.stopPropagation();toggleCk();});
  return el;
}

function updateBar(){
  const n=selected.size;
  const btn=document.getElementById('cmpbtn');
  btn.textContent=`${n}개 선택 — 비교하기`;
  btn.disabled=n<2;
  document.getElementById('cmpcount').textContent=n>0?`최대 10개 선택 가능`:'';
}

// 같은 약재의 이명(異名) 정규화 — 비교 시 동일 약재로 취급
// 자감초=감초(구운 것), 생석고=석고, 적작약=작약 등
const HERB_ALIAS={
  '자감초':'감초',
  '생석고':'석고',
  '적작약':'작약',
};
function normBase(name){
  return HERB_ALIAS[name]||name;
}

// 약재명에서 괄호 안 용량을 분리: '계지(5냥)' → {base:'계지', dose:'5냥'}
function parseHerb(h){
  const m=h.match(/^(.+?)\(([^)]+)\)$/);
  if(m) return {base:normBase(m[1].trim()), dose:m[2].trim(), full:h, raw:m[1].trim()};
  return {base:normBase(h), dose:'', full:h, raw:h};
}

function showCompare(){
  const items=[...selected.values()];

  // 각 처방별로 약재를 파싱
  const parsedItems=items.map(d=>({
    ...d,
    parsedHerbs: d.herbs.map(parseHerb),
    parsedKey: d.key.map(k=>parseHerb(k).base),
  }));

  // 공통 약재 = base명 기준으로 모든 처방에 존재하는 것
  const allBases=[...new Set(parsedItems.flatMap(d=>d.parsedHerbs.map(h=>h.base)))];
  const sharedBases=allBases.filter(base=>parsedItems.every(d=>d.parsedHerbs.some(h=>h.base===base)));

  const cols=Math.min(items.length,3);
  let html=`<div class="cmp-grid" style="grid-template-columns:repeat(${cols},1fr);">`;

  parsedItems.forEach(d=>{
    const col=d.color||SECS[d._si].color;
    const c=PAL[col],cl=LT[col],cm=MD[col];

    const herbs=d.parsedHerbs.map(h=>{
      const isSh=sharedBases.includes(h.base);
      const isK=d.parsedKey.includes(h.base);

      // 같은 base인데 처방마다 용량이 다른지 확인
      const dosesAcrossItems=parsedItems.map(it=>{
        const found=it.parsedHerbs.find(x=>x.base===h.base);
        return found?found.dose:'';
      });
      const hasDoseDiff=isSh && dosesAcrossItems.some(dose=>dose!==dosesAcrossItems[0]);

      // 표시: 약재명(원래 이름) + 용량 뱃지(용량 있을 때만) + 공통★
      // 자감초처럼 정규화된 약재는 원래 이름 그대로 표시하되 공통 인식은 base로 함
      const isAlias=h.raw!==h.base;
      let label=`<span style="font-weight:${isK?'700':'400'}">${h.raw}</span>`;
      if(isAlias){
        label+=` <span style="font-size:8px;color:#999;">(≡${h.base})</span>`;
      }
      if(h.dose){
        const doseColor=hasDoseDiff?'#e67e22':'#888';
        label+=` <span style="font-size:9px;background:${hasDoseDiff?'#fef9f0':'#f5f5f5'};color:${doseColor};padding:1px 4px;border-radius:4px;border:1px solid ${hasDoseDiff?'#f5cba7':'#e0e0e0'};">${h.dose}</span>`;
      }
      if(isSh) label+=` <span style="color:#2ecc71;font-size:10px;">★</span>`;

      return `<span class="herb${isK?' k':''}" style="${isK?`background:${cl};color:${c};border-color:${cm};`:''}${isSh?'outline:2px solid #2ecc71;outline-offset:1px;':''}">${label}</span>`;
    }).join('');

    html+=`<div class="cmp-col" style="border-top:3px solid ${c};">
      <div class="cmp-name" style="color:${c};">${d.name}</div>
      <div class="cmp-sec">구성 약재</div><div class="cmp-hlist">${herbs}</div>
      <div class="cmp-sec">주증상</div><div style="font-size:10px;color:#666;line-height:1.5;">${d.symp}</div>
      <div class="cmp-sec">특징</div><div style="font-size:10px;color:#666;line-height:1.5;">${d.point}</div>
    </div>`;
  });
  html+='</div>';

  if(sharedBases.length){
    // 공통 약재 표시: 처방간 용량 차이가 있으면 각 처방 용량 나열
    const sharedHtml=sharedBases.map(base=>{
      const doses=parsedItems.map(d=>{
        const found=d.parsedHerbs.find(h=>h.base===base);
        return found&&found.dose?found.dose:'표준';
      });
      const allSame=doses.every(v=>v===doses[0]);
      let label=`<span style="font-weight:700;">${base}</span>`;
      if(!allSame){
        const doseList=parsedItems.map((d,i)=>`<span style="font-size:9px;color:#e67e22;">${d.name.length>5?d.name.slice(0,5)+'…':d.name}: ${doses[i]}</span>`).join(' / ');
        label+=` <span style="font-size:10px;color:#e67e22;">(용량 상이: ${doseList})</span>`;
      } else if(doses[0]!=='표준'){
        label+=` <span style="font-size:9px;color:#888;">(${doses[0]})</span>`;
      }
      return `<span class="herb" style="outline:2px solid #2ecc71;">${label}</span>`;
    }).join('');

    html+=`<div class="shared-row">
      <h3>★ 공통 약재 (${sharedBases.length}개) — <span style="color:#e67e22;font-size:10px;">주황 뱃지 = 처방간 용량 다름</span></h3>
      <div class="shared-tags">${sharedHtml}</div>
    </div>`;
  }

  document.getElementById('mbody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}

const tabRow=document.getElementById('tabs');
const secsEl=document.getElementById('secs');

SECS.forEach((sec,i)=>{
  const btn=document.createElement('button');
  btn.className='tab'+(i===0?' on':'');
  btn.textContent=sec.name;
  if(i===0){btn.style.background=TC[i];btn.style.color='#fff';}
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('on');t.style.background='';t.style.color='';});
    btn.classList.add('on');btn.style.background=TC[i];btn.style.color='#fff';
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('vis'));
    document.getElementById('sec'+i).classList.add('vis');
  });
  tabRow.appendChild(btn);
  const sdiv=document.createElement('div');
  sdiv.className='sec'+(i===0?' vis':'');
  sdiv.id='sec'+i;
  if(i===SECS.length-1){
    sdiv.innerHTML=`<div class="stitle">치료 팔법(八法)</div><div class="pb-grid" id="pb"></div><div style="height:.8rem;"></div>
    <div class="cmpbox"><h3>마황탕증 vs 계지탕증 핵심 비교</h3><div class="cmpg2">
      <div class="cmpc"><strong>마황탕 (표실증)</strong>맥 부긴(浮緊)<br><span class="diff">무한(땀 없음)</span><br><span class="diff">오한 심함·신동</span><br>마황·계지·행인·감초</div>
      <div class="cmpc"><strong>계지탕 (표허증)</strong>맥 부완(浮緩)<br><span class="diff">한출(땀 남)</span><br><span class="diff">오풍·발열</span><br>계지·작약·생강·대조·감초</div>
    </div></div>
    <div class="cmpbox"><h3>태음병 vs 소음병</h3><div class="cmpg2">
      <div class="cmpc"><strong>태음병</strong>리허한증 — <span class="diff">뱃속만</span> 차다<br>자리불갈·창만·구토<br>표리: 양명과 표리<br>대표방: 이중탕</div>
      <div class="cmpc"><strong>소음병</strong>전신허한증 — <span class="diff">전신</span> 차다<br>맥미세·단욕매<br>표리: 태양과 표리<br>대표방: 사역탕</div>
    </div></div>
    <div class="cmpbox"><h3>승기탕류 사하력 비교</h3><div class="sgbar">
      <div class="sgitem" style="background:#fdf2f2;border:1px solid #e8a09a;"><div style="font-size:12px;font-weight:700;color:#c0392b;">대승기탕</div><div style="font-size:10px;color:#c0392b;">대황+후박+지실+망초</div><div style="font-size:9px;color:#a93226;margin-top:2px;">비·만·조·실 (가장 강)</div></div>
      <div class="sgarr">></div>
      <div class="sgitem" style="background:#fef9f0;border:1px solid #f5cba7;"><div style="font-size:12px;font-weight:700;color:#e67e22;">소승기탕</div><div style="font-size:10px;color:#e67e22;">대황+후박+지실</div><div style="font-size:9px;color:#ca6f1e;margin-top:2px;">비·만·실</div></div>
      <div class="sgarr">></div>
      <div class="sgitem" style="background:#eaf6fb;border:1px solid #8dc8df;"><div style="font-size:12px;font-weight:700;color:#1a6b8a;">조위승기탕</div><div style="font-size:10px;color:#1a6b8a;">대황+망초+감초</div><div style="font-size:9px;color:#148a74;margin-top:2px;">조·실 (가장 완만)</div></div>
    </div></div>
    <div class="cmpbox"><h3>6경병 전경 방식</h3><div style="font-size:11px;color:#666;line-height:1.9;">
      <div>① <strong style="color:#111;">일반전경</strong> — 태양의 사기가 양명 또는 소양으로 전경</div>
      <div>② <strong style="color:#111;">표리전경</strong> — 태양→소음 / 소양→궐음으로 전경</div>
      <div>③ <strong style="color:#111;">월전경</strong> — 태양의 사기가 태음으로 전경 (양명·소양 건너뜀)</div>
      <div>④ <strong style="color:#111;">직중(直中)</strong> — 처음부터 소음 증후 발생 (장기 기운 약한 경우)</div>
      <div>⑤ <strong style="color:#111;">합병(合病)</strong> — 선후 구분 없이 2~3개 경에 동시 발병</div>
      <div>⑥ <strong style="color:#111;">병병(倂病)</strong> — 선후 구분 있음 / 한 병이 낫기 전 추가 발생</div>
    </div></div>`;
    secsEl.appendChild(sdiv);
    const pb=sdiv.querySelector('#pb');
    PALBUP.forEach(d=>{
      const c=PAL[d.color],cl=LT[d.color];
      const el=document.createElement('div');
      el.className='pb-card';
      el.innerHTML=`<div class="pb-han" style="color:${c};">${d.han}</div>
        <div class="pb-name" style="color:${c};">${d.name}</div>
        <div class="pb-desc">${d.desc}</div>
        <div class="pb-ex" style="background:${cl};color:${c};">${d.ex}</div>`;
      pb.appendChild(el);
    });
    return;
  }
  sdiv.innerHTML=`<div class="stitle">${sec.note}</div>`;
  const grid=document.createElement('div');grid.className='grid';
  sec.cards.forEach(d=>grid.appendChild(makeCard(d,i)));
  sdiv.appendChild(grid);
  secsEl.appendChild(sdiv);
});

document.getElementById('cmpbtn').addEventListener('click',showCompare);
document.getElementById('clrbtn').addEventListener('click',()=>{
  selected.clear();
  document.querySelectorAll('.ck').forEach(ck=>{ck.style.background='';ck.style.borderColor='#ccc';ck.textContent='';});
  updateBar();
});
document.getElementById('mcls').addEventListener('click',()=>document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('mprint').addEventListener('click',()=>{
  document.body.classList.add('printing-cmp');
  setTimeout(()=>{
    window.print();
    setTimeout(()=>document.body.classList.remove('printing-cmp'),300);
  },50);
});
</script>
